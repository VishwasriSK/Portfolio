<!DOCTYPE html>
<html>
<head>
    <title>Photo to Base64</title>
</head>
<body>
    <input type="file" id="photoInput" accept="image/*">
    <button onclick="convertToBase64()">Convert to Base64</button>
    <textarea id="output" style="width: 100%; height: 300px;"></textarea>
    
    <script>
        function convertToBase64() {
            const file = document.getElementById('photoInput').files[0];
            if (!file) {
                alert('Please select a photo first');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result;
                document.getElementById('output').value = base64;
                console.log('Base64:', base64.substring(0, 100));
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
